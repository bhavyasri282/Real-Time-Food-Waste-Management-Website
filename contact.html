<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>Contact Us</h1>
  </header>

  <section class="contact-section">
    <form id="contactForm">
      <input type="text" placeholder="Your Name" required>
      <input type="email" placeholder="Your Email" required>
      <textarea placeholder="Your Message" rows="5" required></textarea>
      <button type="submit" class="btn">Send Message</button>
    </form>
    <p style="text-align:center; color:green;" id="contactConfirm"></p>

    <div class="contact-info">
      <p>Email: info@foodwaste.org</p>
      <p>Phone: +91 123 456 7890</p>
      <p>Follow us on social media: Facebook | Instagram | Twitter</p>
    </div>
  </section>

  <footer>
    <p>&copy; 2026 Real-Time Food Waste Management</p>
  </footer>

  <script>
    const contactForm = document.getElementById("contactForm");
    const contactConfirm = document.getElementById("contactConfirm");
    contactForm.addEventListener("submit", (e) => {
      e.preventDefault();
      contactConfirm.textContent = "Thank you! Your message has been sent.";
      contactForm.reset();
    });
  </script>
</body>
</html>
