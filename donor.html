<!DOCTYPE html>
<html>
<head>
  <title>Donor</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="donor-page">

<nav class="navbar">
  <h3>Food Waste System</h3>
</nav>

<h2 style="text-align:center;">Donate Food</h2>

<form id="form">
  <input id="name" placeholder="Name" required>
  <input id="food" placeholder="Food Type" required>
  <input id="quantity" placeholder="Quantity" required>

  <!-- 🔥 NEW ADDRESS INPUT -->
  <input id="address" placeholder="Enter Address (Optional)">

  <button type="button" onclick="getLocation()">Share Location 📍</button>
  <p id="locText"></p>

  <button type="submit">Submit</button>
</form>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script src="firebase.js"></script>
<script src="donor.js"></script>

</body>
</html>
