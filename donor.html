<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Donate Food</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/donor.js" defer></script>
</head>
<body>
  <header>
    <h1>Donate Your Surplus Food</h1>
  </header>

  <section class="form-section">
    <form id="foodForm">
      <input type="text" id="donorName" placeholder="Your Name" required>
      <input type="text" id="foodType" placeholder="Food Type" required>
      <input type="number" id="quantity" placeholder="Quantity" required>
      <input type="text" id="location" placeholder="Location" required>
      <input type="date" id="expiryDate" required>
      <button type="submit" class="btn">Submit Donation</button>
    </form>
    <p id="confirmation" style="text-align:center; color:green;"></p>
  </section>

  <footer>
    <p>&copy; 2026 Real-Time Food Waste Management</p>
  </footer>
</body>
</html>
